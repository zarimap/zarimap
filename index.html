<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ザリマップ | Zarimap</title>
    <style>
        /* ザリガニをイメージした赤と泥色のデザイン */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            text-align: center;
            background-color: #f4f1ea; /* 砂っぽい色 */
            color: #3e2723; /* 濃い茶色 */
            margin: 0;
            padding: 50px 20px;
        }
        h1 { font-size: 3rem; color: #b22222; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-bottom: 40px; }
        
        /* 言語選択ボタンのスタイル */
        .btn-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .lang-btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            background-color: #b22222; /* ザリガニレッド */
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .lang-btn:hover {
            background-color: #8b0000;
            transform: translateY(-3px);
        }
        .footer { margin-top: 60px; font-size: 0.9rem; color: #8d6e63; }
    </style>
</head>
<body>

    <h1>🦞 ザリマップ</h1>
    <p>ザリガニの目撃情報を世界中で共有しよう！</p>

    <div class="btn-container">
        <!-- 日本語版へのリンク -->
        <a href="ja/map/" class="lang-btn">日本語</a>
        
        <!-- 英語版へのリンク（まだ作っていなくても枠だけ用意） -->
        <a href="en/map/" class="lang-btn">English</a>
    </div>

    <div class="footer">
        © 2024 Zarimap Organization. Built with GitHub Pages.
    </div>

</body>
</html>
